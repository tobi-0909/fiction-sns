{% extends "base.html" %}

{% block title %}プライバシーポリシー - fiction SNS{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <h1>プライバシーポリシー</h1>
            <hr>
            
            <div class="privacy-content">
                {{ privacy_content|safe }}
            </div>
            
            <hr>
            <p class="text-muted small">
                最終更新: 2026年3月19日
                <br>
                <a href="{% url 'tos' %}">利用規約</a> | 
                <a href="{{ request.META.HTTP_HOST }}/admin/">お問い合わせ</a>
            </p>
        </div>
    </div>
</div>

<style>
    .privacy-content h2 {
        margin-top: 2rem;
        margin-bottom: 1rem;
        border-bottom: 2px solid #28a745;
        padding-bottom: 0.5rem;
    }
    
    .privacy-content h3 {
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
        color: #333;
    }
    
    .privacy-content table {
        margin: 1rem 0;
        width: 100%;
        border-collapse: collapse;
    }
    
    .privacy-content table th,
    .privacy-content table td {
        border: 1px solid #ddd;
        padding: 0.75rem;
        text-align: left;
    }
    
    .privacy-content table th {
        background-color: #f8f9fa;
        font-weight: bold;
    }
    
    .privacy-content ul, .privacy-content ol {
        margin-left: 2rem;
        margin-bottom: 1rem;
    }
    
    .privacy-content li {
        margin-bottom: 0.5rem;
    }
    
    .privacy-content blockquote {
        border-left: 4px solid #28a745;
        padding-left: 1rem;
        margin-left: 0;
        color: #666;
    }
</style>
{% endblock %}
