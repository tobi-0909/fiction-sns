{% extends "base.html" %}

{% block title %}ログイン | Fictions Flow SNS{% endblock %}

{% block content %}
<section class="hero auth-card">
  <h2>ログイン</h2>
  {% if next_url %}
    <p class="notice">ログイン後、元の画面に戻ります。</p>
  {% endif %}
  <form method="post" class="auth-form">
    {% csrf_token %}
    {% if next_url %}
      <input type="hidden" name="next" value="{{ next_url }}">
    {% endif %}
    {{ form.as_p }}
    <button type="submit">ログイン</button>
  </form>
  <p>アカウントがない場合は <a href="{{ signup_url }}">新規登録</a> へ。</p>
</section>
{% endblock %}
