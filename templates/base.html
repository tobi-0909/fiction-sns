<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fictions Flow SNS{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="brand"><a href="/">Fictions Flow SNS</a></h1>
      <p class="tagline">物語世界とキャラクターを育てるSNS</p>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="/">ホーム</a>
        {% if user.is_authenticated %}
          <a href="{% url 'dashboard' %}">ダッシュボード</a>
          <a href="{% url 'world_list' %}">World一覧</a>
          <a href="{% url 'profile_settings' %}">プロフィール設定</a>
          <span class="auth-handle">@{{ user.handle|default:user.username }}</span>
          <form method="post" action="{% url 'logout' %}" class="logout-form">
            {% csrf_token %}
            <button type="submit">ログアウト</button>
          </form>
        {% else %}
          <a href="{% url 'signup' %}">新規登録</a>
          <a href="{% url 'login' %}">ログイン</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>© Fictions Flow SNS</small>
    </div>
  </footer>
</body>
</html>
